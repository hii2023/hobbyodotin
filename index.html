<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hobbyo. A world of hobbies awaits you.</title>
<meta name="description" content="Hobbyo is coming soon. Painting, pottery, macrame, paper craft, music, dance, chess and more. A world of hobbies awaits you.">
<meta property="og:title" content="Hobbyo. Coming soon.">
<meta property="og:description" content="A world of hobbies awaits you. Launching soon at hobbyo.in">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hobbyo.in">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23faf8f5'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='36' text-anchor='middle' fill='%232b2b28'%3Eh%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --wall: #f7f5f1;
    --wall-deep: #efece6;
    --floor: #e3e0da;
    --ink: #2b2b28;
    --ink-soft: #6b6a64;
    --line: #dcd8d0;
    --accent: #3d6b57;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background: var(--wall);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .scene {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(120% 90% at 50% 0%, #fbfaf7 0%, var(--wall) 55%, var(--wall-deep) 100%);
  }

  /* gallery floor */
  .scene::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 12svh;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--floor) 100%);
    pointer-events: none;
  }

  /* soft light wash across the wall */
  .light {
    position: absolute;
    inset: 0;
    background: radial-gradient(60% 45% at 50% 40%, rgba(255,255,255,.75) 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    animation: lightIn 2.4s ease .3s forwards;
    pointer-events: none;
  }
  @keyframes lightIn { to { opacity: 1; } }

  /* ---------- header ---------- */
  header {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(16px, 2.4vw, 30px) clamp(22px, 5vw, 64px);
    opacity: 0;
    animation: fadeDown 1s ease .2s forwards;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 2.6vw, 34px);
    font-weight: 600;
    letter-spacing: .02em;
    color: var(--ink);
    text-decoration: none;
  }
  .wordmark span { color: var(--accent); }

  .soon-pill {
    font-size: 12px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px;
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(4px);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    white-space: nowrap;
  }
  .soon-pill i {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .35; transform: scale(.7); }
  }

  /* ---------- main ---------- */
  main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(12px, 2.4svh, 30px);
  }

  /* ---------- endless gallery marquee ---------- */
  .gallery {
    position: relative;
    width: 100%;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 1.6s ease forwards;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
    --fw: clamp(88px, 9.6vw, 140px);
    --fwp: clamp(72px, 7.8vw, 112px);
    padding: clamp(10px, 2svh, 22px) 0 clamp(16px, 2.8svh, 32px);
  }
  .gallery.g1 { animation-delay: .4s; }
  .gallery.g2 { animation-delay: .7s; }

  .track {
    display: flex;
    width: max-content;
    animation: marquee 95s linear infinite;
    will-change: transform;
  }
  .g2 .track {
    animation-duration: 110s;
    animation-direction: reverse;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .set {
    display: flex;
    align-items: center;
    gap: clamp(18px, 2.6vw, 42px);
    padding-right: clamp(18px, 2.6vw, 42px);
  }

  .painting {
    flex: 0 0 auto;
    animation: bob 7s ease-in-out infinite alternate;
  }
  .set .painting:nth-child(2n)  { animation-duration: 8.5s; animation-delay: -2.5s; }
  .set .painting:nth-child(3n)  { animation-duration: 9.5s; animation-delay: -5s; }
  @keyframes bob {
    from { transform: translateY(0); }
    to   { transform: translateY(-7px); }
  }

  .frame {
    width: var(--fw);
    aspect-ratio: 5 / 4;
    background: #fff;
    padding: 6px;
    box-shadow:
      0 1px 2px rgba(43,43,40,.10),
      0 14px 28px -14px rgba(43,43,40,.28);
  }
  .painting.portrait .frame {
    width: var(--fwp);
    aspect-ratio: 3 / 4;
  }
  .set .painting:nth-child(2n) .frame { transform: rotate(.5deg); }
  .set .painting:nth-child(2n+1) .frame { transform: rotate(-.5deg); }

  .canvas {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas svg {
    width: 62%;
    height: 62%;
    fill: none;
    stroke: var(--ink);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: .82;
  }
  .canvas svg .fill { fill: var(--ink); stroke: none; }

  /* pastel washes */
  .w-mint   { background: linear-gradient(170deg, #d4e7dc 0%, #bcd9cb 100%); }
  .w-sky    { background: linear-gradient(170deg, #d3e2ee 0%, #bdd5e6 100%); }
  .w-sand   { background: linear-gradient(170deg, #f0e7d5 0%, #e7dabf 100%); }
  .w-blush  { background: linear-gradient(170deg, #f3dcd6 0%, #edccc4 100%); }
  .w-butter { background: linear-gradient(170deg, #f6e8c0 0%, #f0dda6 100%); }
  .w-lilac  { background: linear-gradient(170deg, #e4d6e8 0%, #d8c5de 100%); }

  .placard {
    margin-top: 10px;
    text-align: center;
    font-size: 9.5px;
    font-weight: 400;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  /* ---------- centered hero text ---------- */
  .hero {
    text-align: center;
    max-width: 720px;
    padding: clamp(14px, 3svh, 34px) 22px;
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(38px, 5.8vw, 78px);
    line-height: 1.1;
    color: var(--ink);
  }
  .hero .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(.55em);
    animation: wordIn 1.1s cubic-bezier(.19,1,.22,1) forwards;
  }
  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .hero p {
    font-weight: 300;
    font-size: clamp(15px, 1.6vw, 18px);
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 18px auto 26px;
    max-width: 34em;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.6s forwards;
  }

  .notify {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.85s forwards;
  }
  .notify input {
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--ink);
    background: rgba(255,255,255,.8);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 14px 22px;
    width: min(320px, 72vw);
    outline: none;
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  .notify input::placeholder { color: #a4a29a; }
  .notify input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,107,87,.14);
  }
  .notify button {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #fdfcfa;
    background: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 999px;
    padding: 14px 30px;
    cursor: pointer;
    transition: background-color .25s ease, border-color .25s ease;
  }
  .notify button:hover { background: var(--accent); border-color: var(--accent); }
  .notify button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .thanks {
    display: none;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: .04em;
  }

  footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 0 20px clamp(18px, 2.6svh, 28px);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: #9b9992;
    opacity: 0;
    animation: fadeUp 1.2s ease 2.1s forwards;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 560px) {
    .gallery { --fw: clamp(80px, 21vw, 104px); --fwp: clamp(66px, 17vw, 86px); }
    .track { animation-duration: 70s; }
    .g2 .track { animation-duration: 80s; }
    .hero h1 { font-size: clamp(36px, 10vw, 48px); }
    .placard { letter-spacing: .2em; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-delay: 0ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
    .hero .word, .hero p, .notify, header, footer, .light, .gallery { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="light"></div>

  <header>
    <a class="wordmark" href="https://hobbyo.in">hobbyo<span>.</span></a>
    <div class="soon-pill"><i></i>Coming soon</div>
  </header>

  <main>
    <div class="gallery g1">
      <div class="track" data-set="a" aria-hidden="true"></div>
    </div>

    <div class="hero">
      <h1>
        <span class="word" style="animation-delay:.7s">A</span>
        <span class="word" style="animation-delay:.8s">world</span>
        <span class="word" style="animation-delay:.9s">of</span>
        <span class="word" style="animation-delay:1.0s">hobbies</span>
        <span class="word" style="animation-delay:1.15s">awaits</span>
        <span class="word" style="animation-delay:1.3s">you</span>
      </h1>

      <p>Painting, pottery, macrame, music, chess and everything in between. Opening soon.</p>

      <form class="notify" id="notifyForm" action="https://formsubmit.co/hiiiiii2023@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Hobbyo waitlist signup">
        <input type="hidden" name="_captcha" value="false">
        <label for="email" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Email address</label>
        <input id="email" type="email" name="email" placeholder="Your email address" required autocomplete="email">
        <button type="submit">Notify me</button>
      </form>
      <p class="thanks" id="thanks">Thank you. You will be the first to know.</p>
    </div>

    <div class="gallery g2">
      <div class="track" data-set="b" aria-hidden="true"></div>
    </div>
  </main>

  <footer>hobbyo.in &nbsp;&middot;&nbsp; 2026</footer>
</div>

<script>
  // two different collections, one per gallery line
  var ARTS = [

    { name: 'Sketching', portrait: false,
      svg: '<path d="M62 34 L70 42 L36 76 L24 80 L28 70 Z M58 38 L66 46 M22 88 Q42 82 62 88"/>' },
    { name: 'Pottery', portrait: true,
      svg: '<path d="M40 20 H60 M44 20 C44 28 40 32 36 38 C29 47 30 60 37 68 C41 73 46 76 50 76 C54 76 59 73 63 68 C70 60 71 47 64 38 C60 32 56 28 56 20 M42 82 H58"/>' },
    { name: 'Poetry', portrait: true,
      svg: '<path d="M70 16 C54 20 42 32 36 48 C32 58 31 68 31 76 M31 76 C38 71 47 66 54 58 C63 48 70 32 70 16 Z M31 76 L25 84 M40 88 H72"/>' },
    { name: 'Macrame', portrait: true,
      svg: '<path d="M30 18 H70 M40 18 V30 M60 18 V30 M50 30 L61 43 L50 56 L39 43 Z M42 60 V78 M50 60 V84 M58 60 V78"/>' },
    { name: 'Paper Craft', portrait: false,
      svg: '<path d="M62 22 L36 62 M38 22 L64 62"/><circle cx="31" cy="71" r="7"/><circle cx="69" cy="71" r="7"/><circle class="fill" cx="50" cy="41" r="2.5"/>' },
    { name: 'Origami', portrait: false,
      svg: '<path d="M18 52 L82 26 L58 76 L47 58 Z M82 26 L47 58"/>' },
    { name: 'Calligraphy', portrait: true,
      svg: '<path d="M50 16 L62 42 L50 68 L38 42 Z M50 42 V56"/><circle class="fill" cx="50" cy="42" r="2.5"/><path d="M30 84 Q50 74 70 84"/>' },
    { name: 'Embroidery', portrait: false,
      svg: '<circle cx="50" cy="52" r="26"/><path d="M50 26 V16 M44 18 H56 M50 44 V38 M50 60 V66 M42 52 H36 M58 52 H64 M44 46 L40 42 M56 58 L60 62 M56 46 L60 42 M44 58 L40 62"/><circle class="fill" cx="50" cy="52" r="3"/>' },
    { name: 'Sculpting', portrait: true,
      svg: '<path d="M38 78 H62 M42 78 V68 H58 V78 M50 22 C58 22 62 28 62 36 C62 42 58 46 54 48 L58 68 H42 L46 48 C42 46 38 42 38 36 C38 28 42 22 50 22 Z"/>' },
    { name: 'Puppetry', portrait: true,
      svg: '<path d="M30 18 H70 M50 12 V24 M36 18 V42 M64 18 V44 M50 24 V36"/><circle cx="50" cy="42" r="5"/><path d="M50 47 V60 M50 50 L36 44 M50 50 L64 46 M50 60 L42 74 M50 60 L58 74"/>' },
    { name: 'Rangoli', portrait: false,
      svg: '<path d="M50 24 C56 32 56 40 50 45 C44 40 44 32 50 24 Z M50 76 C56 68 56 60 50 55 C44 60 44 68 50 76 Z M24 50 C32 44 40 44 45 50 C40 56 32 56 24 50 Z M76 50 C68 44 60 44 55 50 C60 56 68 56 76 50 Z"/><circle class="fill" cx="50" cy="50" r="3"/><circle class="fill" cx="34" cy="34" r="2.5"/><circle class="fill" cx="66" cy="34" r="2.5"/><circle class="fill" cx="34" cy="66" r="2.5"/><circle class="fill" cx="66" cy="66" r="2.5"/>' },
    { name: 'Knitting', portrait: false,
      svg: '<circle cx="46" cy="60" r="15"/><path d="M34 54 C42 50 52 50 58 55 M34 66 C43 62 52 63 58 67 M28 22 L64 58 M72 24 L48 48"/>' }
  ];

  var ACTIVITIES = [
    { name: 'Music', portrait: true,
      svg: '<path d="M42 62 V30 L64 26 V58 M42 38 L64 34"/><ellipse class="fill" cx="36" cy="63" rx="6" ry="4.5"/><ellipse class="fill" cx="58" cy="59" rx="6" ry="4.5"/>' },
    { name: 'Singing', portrait: true,
      svg: '<path d="M50 18 C58 18 62 24 62 32 V44 C62 52 58 58 50 58 C42 58 38 52 38 44 V32 C38 24 42 18 50 18 Z M30 42 V44 C30 56 38 64 50 64 C62 64 70 56 70 44 V42 M50 64 V78 M40 78 H60"/>' },
    { name: 'Dance', portrait: false,
      svg: '<circle cx="50" cy="20" r="6"/><path d="M32 16 C38 24 44 30 50 32 C56 30 62 24 68 16 M50 32 V48 M50 48 L36 62 H64 Z M44 62 L40 82 M56 62 L60 82"/>' },
    { name: 'Theatre', portrait: false,
      svg: '<path d="M32 24 C44 18 56 18 68 24 C71 42 67 60 50 71 C33 60 29 42 32 24 Z M38 38 Q42 33 46 37 M54 37 Q58 33 62 38 M38 50 Q50 62 62 50"/>' },
    { name: 'Storytelling', portrait: false,
      svg: '<path d="M50 30 C42 24 32 24 26 28 V72 C32 68 42 68 50 72 C58 68 68 68 74 72 V28 C68 24 58 24 50 30 Z M50 30 V72"/>' },
    { name: 'Photography', portrait: false,
      svg: '<rect x="24" y="34" width="52" height="38" rx="6"/><path d="M38 34 L42 26 H58 L62 34"/><circle cx="50" cy="53" r="11"/><circle class="fill" cx="68" cy="42" r="2.5"/>' },
    { name: 'Baking', portrait: true,
      svg: '<path d="M32 52 C28 40 36 30 50 30 C64 30 72 40 68 52 M32 52 H68 L62 78 H38 Z M44 60 L42 70 M56 60 L58 70"/><circle class="fill" cx="50" cy="24" r="3.5"/>' },
    { name: 'Gardening', portrait: true,
      svg: '<path d="M36 58 H64 L60 80 H40 Z M50 58 V44 M50 48 C44 48 38 44 38 34 C46 34 50 39 50 48 Z M50 44 C56 44 62 40 62 30 C54 30 50 35 50 44 Z"/>' },
    { name: 'Chess', portrait: true,
      svg: '<path d="M34 78 H66 M40 78 V70 H60 V78 M44 70 L42 44 H58 L56 70 M42 44 L42 30 L48 30 L48 36 L52 36 L52 30 L58 30 L58 44 Z"/>' },

      svg: '<circle cx="52" cy="24" r="7"/><path d="M50 31 L42 54 M48 37 L30 46 M48 37 L64 28 M42 54 L70 48 M42 54 L38 78"/>' },
    { name: 'Football', portrait: false,
      svg: '<circle cx="50" cy="50" r="29"/><path d="M50 37 L62 46 L57 60 L43 60 L38 46 Z M50 37 V21 M62 46 L76 42 M57 60 L66 74 M43 60 L34 74 M38 46 L24 42"/>' },
    { name: 'Cricket', portrait: true,
      svg: '<path d="M45 12 H53 L56 54 C56 63 52 68 49 68 C46 68 42 63 42 54 Z M45 20 H54"/><circle cx="68" cy="66" r="9"/><path d="M64 59 C60 64 60 68 64 73"/>' },
    { name: 'Swimming', portrait: false,
      svg: '<circle cx="46" cy="38" r="6"/><path d="M52 44 C60 36 68 34 76 40 M18 62 Q26 56 34 62 T50 62 T66 62 T82 62 M18 72 Q26 66 34 72 T50 72 T66 72 T82 72"/>' },

      svg: '<rect x="32" y="38" width="36" height="30" rx="6"/><path d="M50 38 V28 M32 52 H26 M68 52 H74 M43 60 H57"/><circle class="fill" cx="50" cy="25" r="3"/><circle class="fill" cx="43" cy="51" r="3"/><circle class="fill" cx="57" cy="51" r="3"/>' }
  ];

  var WASHES = ['w-mint', 'w-sky', 'w-sand', 'w-blush', 'w-butter', 'w-lilac'];

  function paintingHTML(h, i) {
    return '<figure class="painting' + (h.portrait ? ' portrait' : '') + '">' +
      '<div class="frame"><div class="canvas ' + WASHES[i % WASHES.length] + '">' +
      '<svg viewBox="0 0 100 100">' + h.svg + '</svg>' +
      '</div></div>' +
      '<figcaption class="placard">' + h.name + '</figcaption>' +
      '</figure>';
  }

  document.querySelectorAll('.track').forEach(function (track) {
    var list = track.getAttribute('data-set') === 'a' ? ARTS : ACTIVITIES;
    var set = '<div class="set">' + list.map(paintingHTML).join('') + '</div>';
    track.innerHTML = set + set;
  });

  // submit the waitlist form in the background, keep the user on the page
  (function () {
    var form = document.getElementById('notifyForm');
    var thanks = document.getElementById('thanks');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var data = new FormData(form);
      fetch('https://formsubmit.co/ajax/hiiiiii2023@gmail.com', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: data
      }).catch(function () {});
      form.style.display = 'none';
      thanks.style.display = 'block';
    });
  })();
</script>

</body>
