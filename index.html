<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hobbyo. A world of hobbies awaits you.</title>
<meta name="description" content="Hobbyo is coming soon. Discover, learn and fall in love with a new hobby. A world of hobbies awaits you.">
<meta property="og:title" content="Hobbyo. Coming soon.">
<meta property="og:description" content="A world of hobbies awaits you. Launching soon at hobbyo.in">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hobbyo.in">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23faf8f5'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='36' text-anchor='middle' fill='%232b2b28'%3Eh%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --wall: #f7f5f1;
    --wall-deep: #efece6;
    --floor: #e3e0da;
    --ink: #2b2b28;
    --ink-soft: #6b6a64;
    --line: #dcd8d0;
    --accent: #3d6b57;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background: var(--wall);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .scene {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(120% 90% at 50% 0%, #fbfaf7 0%, var(--wall) 55%, var(--wall-deep) 100%);
  }

  /* gallery floor */
  .scene::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 16svh;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--floor) 100%);
    pointer-events: none;
  }

  /* soft light wash across the wall */
  .light {
    position: absolute;
    inset: 0;
    background: radial-gradient(60% 45% at 50% 32%, rgba(255,255,255,.75) 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    animation: lightIn 2.4s ease .3s forwards;
    pointer-events: none;
  }
  @keyframes lightIn { to { opacity: 1; } }

  /* ---------- header ---------- */
  header {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(20px, 3.4vw, 40px) clamp(22px, 5vw, 64px);
    opacity: 0;
    animation: fadeDown 1s ease .2s forwards;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 2.6vw, 34px);
    font-weight: 600;
    letter-spacing: .02em;
    color: var(--ink);
    text-decoration: none;
  }
  .wordmark span { color: var(--accent); }

  .soon-pill {
    font-size: 12px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px;
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(4px);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    white-space: nowrap;
  }
  .soon-pill i {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .35; transform: scale(.7); }
  }

  /* ---------- gallery ---------- */
  main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px clamp(40px, 7svh, 90px);
  }

  .gallery {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(18px, 3.4vw, 56px);
    padding: clamp(10px, 3svh, 30px) 0 clamp(26px, 5svh, 56px);
  }

  .painting {
    position: relative;
    flex: 0 0 auto;
    width: clamp(96px, 11.5vw, 168px);
    aspect-ratio: 5 / 4;
    background: #fff;
    padding: 6px;
    box-shadow:
      0 1px 2px rgba(43,43,40,.10),
      0 14px 28px -14px rgba(43,43,40,.28);
    opacity: 0;
    transform: translateY(26px);
    animation: riseIn 1.3s cubic-bezier(.19,1,.22,1) forwards;
    will-change: transform;
    transition: transform .35s ease;
  }
  .painting:nth-child(1) { animation-delay: .35s; aspect-ratio: 3 / 4; width: clamp(78px, 8.6vw, 126px); }
  .painting:nth-child(2) { animation-delay: .50s; }
  .painting:nth-child(3) { animation-delay: .65s; }
  .painting:nth-child(4) { animation-delay: .80s; }
  .painting:nth-child(5) { animation-delay: .95s; }
  .painting:nth-child(6) { animation-delay: 1.10s; aspect-ratio: 3 / 4; width: clamp(78px, 8.6vw, 126px); }

  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .canvas { width: 100%; height: 100%; }

  /* pastel artworks, painted in CSS */
  .art-daisy {
    background:
      radial-gradient(26% 22% at 50% 52%, #f2c94c 0%, #f2c94c 55%, transparent 56%),
      radial-gradient(80% 34% at 50% 20%, #ffffff 0%, transparent 60%),
      radial-gradient(80% 34% at 50% 84%, #ffffff 0%, transparent 60%),
      radial-gradient(34% 80% at 18% 52%, #ffffff 0%, transparent 60%),
      radial-gradient(34% 80% at 82% 52%, #ffffff 0%, transparent 60%),
      linear-gradient(180deg, #bfe3d9 0%, #a8d8cf 100%);
  }
  .art-shore {
    background: linear-gradient(180deg, #bcd9e4 0%, #bcd9e4 58%, #e9e2d2 59%, #f3ede0 100%);
  }
  .art-meadow {
    background: linear-gradient(180deg, #cfe0c8 0%, #b7d2ad 55%, #9ec39a 100%);
  }
  .art-sunset {
    background: linear-gradient(180deg, #f0b95e 0%, #eeaf57 46%, #e0654e 52%, #7fb98a 58%, #6aae7f 100%);
  }
  .art-dawn {
    background: linear-gradient(180deg, #f3d47c 0%, #eec86f 62%, #e8a3a0 68%, #f2e3d5 100%);
  }
  .art-lilac {
    background:
      radial-gradient(30% 24% at 58% 78%, rgba(43,43,40,.45) 0%, rgba(43,43,40,.45) 52%, transparent 53%),
      linear-gradient(180deg, #d6b6d4 0%, #c9a7cd 100%);
  }

  /* headline sits over the gallery */
  .headline {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 3;
  }
  .headline h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(38px, 6.8vw, 92px);
    line-height: 1.08;
    text-align: center;
    color: var(--ink);
    text-shadow:
      0 0 22px rgba(247,245,241,.9),
      0 0 46px rgba(247,245,241,.75);
    max-width: 14em;
  }
  .headline .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(.55em);
    animation: wordIn 1.1s cubic-bezier(.19,1,.22,1) forwards;
  }
  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- below the wall ---------- */
  .below {
    text-align: center;
    max-width: 620px;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.9s forwards;
  }

  .below p {
    font-weight: 300;
    font-size: clamp(15px, 1.6vw, 18px);
    line-height: 1.7;
    color: var(--ink-soft);
    margin-bottom: 30px;
  }

  .notify {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .notify input {
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--ink);
    background: rgba(255,255,255,.8);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 14px 22px;
    width: min(320px, 72vw);
    outline: none;
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  .notify input::placeholder { color: #a4a29a; }
  .notify input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,107,87,.14);
  }
  .notify button {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #fdfcfa;
    background: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 999px;
    padding: 14px 30px;
    cursor: pointer;
    transition: background-color .25s ease, border-color .25s ease;
  }
  .notify button:hover { background: var(--accent); border-color: var(--accent); }
  .notify button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .thanks {
    display: none;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: .04em;
  }

  footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 0 20px clamp(22px, 3.4svh, 34px);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: #9b9992;
    opacity: 0;
    animation: fadeUp 1.2s ease 2.2s forwards;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 900px) {
    .painting:nth-child(1), .painting:nth-child(6) { display: none; }
    .painting { width: clamp(104px, 17vw, 150px); }
  }
  @media (max-width: 560px) {
    .painting:nth-child(5) { display: none; }
    .painting { width: clamp(92px, 26vw, 120px); }
    .gallery { gap: 16px; }
    .headline h1 { font-size: clamp(34px, 10.5vw, 48px); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-delay: 0ms !important;
      transition-duration: .01ms !important;
    }
    .painting, .headline .word, header, .below, footer, .light { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="light"></div>

  <header>
    <a class="wordmark" href="https://hobbyo.in">hobbyo<span>.</span></a>
    <div class="soon-pill"><i></i>Coming soon</div>
  </header>

  <main>
    <div class="gallery" aria-hidden="true">
      <div class="painting"><div class="canvas art-daisy"></div></div>
      <div class="painting"><div class="canvas art-shore"></div></div>
      <div class="painting"><div class="canvas art-meadow"></div></div>
      <div class="painting"><div class="canvas art-sunset"></div></div>
      <div class="painting"><div class="canvas art-dawn"></div></div>
      <div class="painting"><div class="canvas art-lilac"></div></div>

      <div class="headline">
        <h1>
          <span class="word" style="animation-delay:.9s">A</span>
          <span class="word" style="animation-delay:1.0s">world</span>
          <span class="word" style="animation-delay:1.1s">of</span>
          <span class="word" style="animation-delay:1.2s">hobbies</span>
          <span class="word" style="animation-delay:1.35s">awaits</span>
          <span class="word" style="animation-delay:1.5s">you</span>
        </h1>
      </div>
    </div>

    <div class="below">
      <p>Painting, pottery, music, chess, gardening and a hundred things you always wanted to try. Hobbyo is where you finally begin. We are opening the doors soon.</p>

      <form class="notify" id="notifyForm" action="https://formsubmit.co/hiiiiii2023@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Hobbyo waitlist signup">
        <input type="hidden" name="_captcha" value="false">
        <label for="email" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Email address</label>
        <input id="email" type="email" name="email" placeholder="Your email address" required autocomplete="email">
        <button type="submit">Notify me</button>
      </form>
      <p class="thanks" id="thanks">Thank you. You will be the first to know.</p>
    </div>
  </main>

  <footer>hobbyo.in &nbsp;&middot;&nbsp; 2026</footer>
</div>

<script>
  // gentle parallax on the paintings, desktop only
  (function () {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if (!window.matchMedia('(pointer: fine)').matches) return;

    var paintings = document.querySelectorAll('.painting');
    var raf = null;

    document.addEventListener('mousemove', function (e) {
      if (raf) return;
      raf = requestAnimationFrame(function () {
        var x = (e.clientX / window.innerWidth - 0.5);
        var y = (e.clientY / window.innerHeight - 0.5);
        paintings.forEach(function (p, i) {
          var depth = 4 + (i % 3) * 3;
          p.style.transform = 'translate(' + (-x * depth) + 'px,' + (-y * depth) + 'px)';
        });
        raf = null;
      });
    });
  })();

  // submit the waitlist form in the background, keep the user on the page
  (function () {
    var form = document.getElementById('notifyForm');
    var thanks = document.getElementById('thanks');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var data = new FormData(form);
      fetch('https://formsubmit.co/ajax/hiiiiii2023@gmail.com', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: data
      }).catch(function () {});
      form.style.display = 'none';
      thanks.style.display = 'block';
    });
  })();
</script>

</body>
</html>
