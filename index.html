<style>
  :root {
    --wall: #f7f5f1;
    --wall-deep: #efece6;
    --floor: #e3e0da;
    --ink: #2b2b28;
    --ink-soft: #6b6a64;
    --line: #dcd8d0;
    --accent: #3d6b57;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background: var(--wall);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .scene {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(120% 90% at 50% 0%, #fbfaf7 0%, var(--wall) 55%, var(--wall-deep) 100%);
  }

  /* gallery floor */
  .scene::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 16svh;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--floor) 100%);
    pointer-events: none;
  }

  /* soft light wash across the wall */
  .light {
    position: absolute;
    inset: 0;
    background: radial-gradient(60% 45% at 50% 32%, rgba(255,255,255,.75) 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    animation: lightIn 2.4s ease .3s forwards;
    pointer-events: none;
  }
  @keyframes lightIn { to { opacity: 1; } }

  /* ---------- header ---------- */
  header {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(20px, 3.4vw, 40px) clamp(22px, 5vw, 64px);
    opacity: 0;
    animation: fadeDown 1s ease .2s forwards;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 2.6vw, 34px);
    font-weight: 600;
    letter-spacing: .02em;
    color: var(--ink);
    text-decoration: none;
  }
  .wordmark span { color: var(--accent); }

  .soon-pill {
    font-size: 12px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px;
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(4px);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    white-space: nowrap;
  }
  .soon-pill i {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .35; transform: scale(.7); }
  }

  /* ---------- main ---------- */
  main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0 clamp(40px, 7svh, 90px);
  }

  /* ---------- endless gallery marquee ---------- */
  .gallery {
    position: relative;
    width: 100%;
    overflow: hidden;
    padding: clamp(12px, 3svh, 30px) 0 clamp(28px, 5svh, 58px);
    opacity: 0;
    animation: fadeUp 1.6s ease .4s forwards;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
  }

  .track {
    display: flex;
    width: max-content;
    animation: marquee 70s linear infinite;
    will-change: transform;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .set {
    display: flex;
    align-items: center;
    gap: clamp(20px, 3vw, 48px);
    padding-right: clamp(20px, 3vw, 48px);
  }

  .painting {
    flex: 0 0 auto;
    animation: bob 7s ease-in-out infinite alternate;
  }
  .set .painting:nth-child(2n)  { animation-duration: 8.5s; animation-delay: -2.5s; }
  .set .painting:nth-child(3n)  { animation-duration: 9.5s; animation-delay: -5s; }
  @keyframes bob {
    from { transform: translateY(0); }
    to   { transform: translateY(-7px); }
  }

  .frame {
    width: clamp(112px, 12.5vw, 176px);
    aspect-ratio: 5 / 4;
    background: #fff;
    padding: 6px;
    box-shadow:
      0 1px 2px rgba(43,43,40,.10),
      0 14px 28px -14px rgba(43,43,40,.28);
  }
  .painting.portrait .frame {
    width: clamp(92px, 10vw, 140px);
    aspect-ratio: 3 / 4;
  }
  .set .painting:nth-child(2n) .frame { transform: rotate(.5deg); }
  .set .painting:nth-child(2n+1) .frame { transform: rotate(-.5deg); }

  .canvas {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas svg {
    width: 62%;
    height: 62%;
    fill: none;
    stroke: var(--ink);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: .82;
  }
  .canvas svg .fill { fill: var(--ink); stroke: none; }

  /* pastel washes */
  .w-mint   { background: linear-gradient(170deg, #d4e7dc 0%, #bcd9cb 100%); }
  .w-sky    { background: linear-gradient(170deg, #d3e2ee 0%, #bdd5e6 100%); }
  .w-sand   { background: linear-gradient(170deg, #f0e7d5 0%, #e7dabf 100%); }
  .w-blush  { background: linear-gradient(170deg, #f3dcd6 0%, #edccc4 100%); }
  .w-butter { background: linear-gradient(170deg, #f6e8c0 0%, #f0dda6 100%); }
  .w-lilac  { background: linear-gradient(170deg, #e4d6e8 0%, #d8c5de 100%); }

  .placard {
    margin-top: 12px;
    text-align: center;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* headline over the moving wall */
  .headline {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 3;
    padding: 0 16px;
  }
  .headline h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(38px, 6.8vw, 92px);
    line-height: 1.08;
    text-align: center;
    color: var(--ink);
    text-shadow:
      0 0 22px rgba(247,245,241,.95),
      0 0 46px rgba(247,245,241,.85),
      0 0 70px rgba(247,245,241,.7);
    max-width: 14em;
  }
  .headline .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(.55em);
    animation: wordIn 1.1s cubic-bezier(.19,1,.22,1) forwards;
  }
  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- below the wall ---------- */
  .below {
    text-align: center;
    max-width: 620px;
    padding: 0 20px;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.9s forwards;
  }

  .below p {
    font-weight: 300;
    font-size: clamp(15px, 1.6vw, 18px);
    line-height: 1.7;
    color: var(--ink-soft);
    margin-bottom: 30px;
  }

  .notify {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .notify input {
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--ink);
    background: rgba(255,255,255,.8);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 14px 22px;
    width: min(320px, 72vw);
    outline: none;
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  .notify input::placeholder { color: #a4a29a; }
  .notify input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,107,87,.14);
  }
  .notify button {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #fdfcfa;
    background: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 999px;
    padding: 14px 30px;
    cursor: pointer;
    transition: background-color .25s ease, border-color .25s ease;
  }
  .notify button:hover { background: var(--accent); border-color: var(--accent); }
  .notify button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .thanks {
    display: none;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: .04em;
  }

  footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 0 20px clamp(22px, 3.4svh, 34px);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: #9b9992;
    opacity: 0;
    animation: fadeUp 1.2s ease 2.2s forwards;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 560px) {
    .frame { width: clamp(96px, 26vw, 120px); }
    .painting.portrait .frame { width: clamp(80px, 21vw, 100px); }
    .headline h1 { font-size: clamp(34px, 10.5vw, 48px); }
    .track { animation-duration: 45s; }
    .placard { letter-spacing: .22em; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-delay: 0ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
    .headline .word, header, .below, footer, .light, .gallery { opacity: 1; transform: none; }
  }
</style>
</head>
